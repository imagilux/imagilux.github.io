{{/*
  Contact form — async submit to the Cloudflare Worker at
  site.Params.formEndpoint (see worker/). Turnstile widget is loaded
  inline so it only fires on pages that actually use this shortcode.
  Honeypot _gotcha is visually hidden; bots fill every field, humans
  don't see it.
*/}}
<form class="imx-contact-form"
      action="{{ site.Params.formEndpoint }}"
      method="post"
      novalidate>
  <div class="imx-field">
    <label for="cf-first">First name</label>
    <input type="text" id="cf-first" name="First name" autocomplete="given-name" required>
  </div>
  <div class="imx-field">
    <label for="cf-last">Last name</label>
    <input type="text" id="cf-last" name="Last name" autocomplete="family-name" required>
  </div>
  <div class="imx-field imx-field--full">
    <label for="cf-email">Work email</label>
    <input type="email" id="cf-email" name="Work email" autocomplete="email" required>
  </div>
  <div class="imx-field">
    <label for="cf-fleet">Fleet size</label>
    <select id="cf-fleet" name="Fleet size">
      <option value="Under 100 nodes">Under 100 nodes</option>
      <option value="100-1,000 nodes">100–1,000 nodes</option>
      <option value="1,000-10,000 nodes" selected>1,000–10,000 nodes</option>
      <option value="10,000+ nodes">10,000+ nodes</option>
    </select>
  </div>
  <div class="imx-field">
    <label for="cf-interest">Primary interest</label>
    <select id="cf-interest" name="Primary interest">
      <option value="UMF">UMF</option>
      <option value="BOREAL" selected>BOREAL</option>
      <option value="Both">Both</option>
      <option value="Other">Other</option>
    </select>
  </div>
  <div class="imx-field imx-field--full">
    <label for="cf-message">What would you like to deploy?</label>
    <textarea id="cf-message" name="Message" rows="4" placeholder="Tell us a little about your fleet and what you're hoping to solve."></textarea>
  </div>

  <div class="imx-honeypot" aria-hidden="true">
    <label>Leave this field blank
      <input type="text" name="_gotcha" tabindex="-1" autocomplete="off">
    </label>
  </div>

  <div class="imx-field imx-field--full imx-turnstile">
    <div class="cf-turnstile" data-sitekey="{{ site.Params.turnstileSiteKey }}"></div>
  </div>

  <div class="imx-field imx-field--full">
    <button class="imx-btn imx-btn--primary" type="submit">Submit request <span class="imx-arr">→</span></button>
  </div>
</form>

<div class="imx-contact-status" role="status" aria-live="polite"></div>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<script>
(function () {
  var form = document.querySelector(".imx-contact-form");
  var status = document.querySelector(".imx-contact-status");
  if (!form || !status) return;

  function setStatus(state, msg) {
    status.dataset.state = state;
    status.textContent = msg;
  }

  form.addEventListener("submit", function (e) {
    e.preventDefault();

    var fd = new FormData(form);
    if (!fd.get("cf-turnstile-response")) {
      setStatus("error", "Please complete the verification challenge.");
      return;
    }

    setStatus("pending", "Sending…");
    var submit = form.querySelector('button[type="submit"]');
    if (submit) submit.disabled = true;

    fetch(form.action, { method: "POST", body: fd })
      .then(function (r) { return r.json().catch(function () { return { ok: false, error: "bad_response" }; }); })
      .then(function (j) {
        if (j && j.ok) {
          form.style.display = "none";
          setStatus("success", "Thanks — an infrastructure specialist will reach out within one business day.");
        } else {
          if (submit) submit.disabled = false;
          setStatus("error", "Something went wrong. Please email contact@imagilux.org directly.");
        }
      })
      .catch(function () {
        if (submit) submit.disabled = false;
        setStatus("error", "Network error. Please email contact@imagilux.org directly.");
      });
  });
})();
</script>
