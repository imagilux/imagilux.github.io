baseURL = "https://www.imagilux.org/"
languageCode = "en-us"
title = "Imagilux — Autonomous I.T Infrastructure Management"
theme = "imagilux"

# Drops Hugo's default RSS / robots / sitemap outputs since the landing page
# is a single document. Re-enable selectively when content sections are added.
disableKinds = ["taxonomy", "term", "RSS"]

[params]
description = "Imagilux delivers autonomous solutions to deploy, manage and evolve your datacenters at scale — without manual intervention."

# Allow raw HTML (forms, embedded SVG, etc.) inside Markdown content.
# Trusted-author site — content is hand-edited by the team, not user-submitted,
# so the XSS risk goldmark's escape default guards against doesn't apply here.
[markup.goldmark.renderer]
unsafe = true

[minify]
disableHTML = false
disableCSS = false
disableJS = false
disableJSON = false
disableSVG = false
disableXML = false

[build]
writeStats = false
